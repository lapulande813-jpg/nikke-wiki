<title>GODDESS OF VICTORY NIKKE 角色名单 - 按上线时间排序</title>
<style>
/* ===== 主题 CSS 变量 ===== */
:root, [data-theme="dark"] {
    --bg: #0a0e17;
    --bg-2: #0c1220;

    --bg-4: #111827;

    --bg-header-grad: linear-gradient(135deg, #0f1729 0%, #1a2744 50%, #0f1729 100%);

    --border: #1e2d4a;
    --border-2: #233656;
    --border-row: #111827;
    --accent: #00d4ff;
    --accent-soft: #00d4ff55;

    --text-strong: #e8ecf4;
    --text-muted: #8899b3;
    --text-dim: #6b7a94;
    --text-faint: #5a6a84;
    --text-very-faint: #4a5578;
    --text-footer: #3a4558;
    --btn-active-grad: linear-gradient(135deg, #00d4ff22, #0088ff22);
    --input-bg: #0a0e17;
    --shadow-hover: 0 6px 24px rgba(0, 212, 255, 0.6);
}
[data-theme="light"] {
    --bg: #f5f7fb;
    --bg-2: #eef1f7;
    --bg-3: #ffffff;
    --bg-4: #e8ecf4;
    --bg-card: #e8ecf4;
    --bg-card-hover: #d6dde9;
    --bg-header-grad: linear-gradient(135deg, #e8ecf4 0%, #f5f7fb 50%, #e8ecf4 100%);
    --bg-row-hover: linear-gradient(90deg, #dae3f355, transparent);
    --bg-stats: rgba(255,255,255,0.9);
    --border: #cbd3df;
    --border-2: #b8c2d0;
    --border-row: #e8ecf4;
    --accent: #0077b6;
    --accent-soft: #0077b655;
    --text: #2a3548;
    --text-strong: #1a2332;
    --text-muted: #4a5568;
    --text-dim: #5e6b7a;
    --text-faint: #6b7280;
    --text-very-faint: #9ca3af;
    --text-footer: #9ca3af;
    --btn-active-grad: linear-gradient(135deg, #0077b622, #00a8cc22);
    --input-bg: #ffffff;
    --shadow-hover: 0 6px 24px rgba(0, 119, 182, 0.35);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, -apple-system, 'Microsoft YaHei', sans-serif;
    min-height: 100vh;
    transition: background 0.25s, color 0.25s;
}
.header {
    background: var(--bg-header-grad);
    border-bottom: 2px solid var(--accent);
    padding: 25px 20px;
    text-align: center;
    position: relative;
    overflow: hidden;
}
.header h1 {
    font-size: 24px;
    color: var(--accent);
    letter-spacing: 3px;
    text-shadow: 0 0 30px var(--accent-soft);
}
.header .subtitle { margin-top: 6px; font-size: 13px; color: var(--text-dim); }

/* 主题切换按钮 */
.theme-toggle {
    position: absolute; top: 20px; right: 24px;
    padding: 6px 14px; border-radius: 18px; cursor: pointer;
    background: var(--bg-card); color: var(--text-muted);
    border: 1px solid var(--border-2); font-size: 13px;
    transition: all 0.2s; display: flex; align-items: center; gap: 6px;
}
.theme-toggle:hover { background: var(--bg-card-hover); color: var(--text-strong); }

.filter-bar {
    display: flex; gap: 6px; padding: 10px 20px;
    background: var(--bg-3); border-bottom: 1px solid var(--border);
    flex-wrap: wrap; align-items: center;
}
.filter-btn {
    padding: 5px 14px; border-radius: 16px; cursor: pointer;
    font-size: 12px; border: 1px solid transparent;
    background: var(--bg-card); color: var(--text-muted); transition: all 0.2s; white-space: nowrap;
}
.filter-btn:hover { background: var(--bg-card-hover); color: var(--text-strong); }
.filter-btn.active {
    background: var(--btn-active-grad);
    border-color: var(--accent); color: var(--accent);
}
.search-box {
    margin-left: auto; padding: 5px 12px; border-radius: 16px;
    border: 1px solid var(--border); background: var(--input-bg); color: var(--text);
    font-size: 12px; outline: none; width: 180px;
}
.search-box:focus { border-color: var(--accent); }
.search-box::placeholder { color: var(--text-very-faint); }
.stats-line {
    display: flex; gap: 30px; padding: 10px 20px;
    background: var(--bg-stats); border-bottom: 1px solid var(--border);
    font-size: 12px; color: var(--text-dim); flex-wrap: wrap;
}
.stats-line span b { color: var(--accent); }

/* 表格样式 */
.table-wrap { max-width: 1200px; margin: 0 auto; padding: 15px 20px; }
.char-table {
    width: 100%; border-collapse: collapse;
}
.char-table thead th {
    position: sticky; top: 0; z-index: 10;
    background: var(--bg-4); color: var(--text-muted);
    font-size: 11px; font-weight: 600; text-transform: uppercase;

}
/* 列宽 */

.col-name { width: auto; min-width: 180px; }

.char-table tbody tr {

.fbtn-Elysion  { color: #818cf8; border-color: rgba(99,102,241,0.45) !important; }

<script>
// ===========================================================================
// 主题切换（白天/夜晚）
// ===========================================================================
function applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    try { localStorage.setItem('nikke_theme', theme); } catch(e){}
    const icon = document.getElementById('themeIcon');
    const text = document.getElementById('themeText');
    if (icon && text) {
        if (theme === 'light') { icon.textContent = '☀️'; text.textContent = '白天'; }
        else { icon.textContent = '🌙'; text.textContent = '夜间'; }
    }
}
function toggleTheme() {
    const cur = document.documentElement.getAttribute('data-theme') || 'dark';
    applyTheme(cur === 'dark' ? 'light' : 'dark');
}
// 页面加载时恢复主题（含系统偏好检测）
(function initTheme(){
    let saved = null;
    try { saved = localStorage.getItem('nikke_theme'); } catch(e){}
    if (!saved) {
        saved = (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) ? 'light' : 'dark';
    }
    document.documentElement.setAttribute('data-theme', saved);
    // DOMContentLoaded 后再更新按钮文字（此时按钮还没渲染）
    document.addEventListener('DOMContentLoaded', () => applyTheme(saved));
})();

// 表头 thead 的 sticky top 设为 page-top-fixed 实际高度（顶部区改变高度时自动同步）
(function syncStickyTop(){
    function update() {
        const top = document.querySelector('.page-top-fixed');
        const ths = document.querySelectorAll('.char-table thead th');
        if (!top || !ths.length) return;
        const h = top.offsetHeight;
        ths.forEach(th => th.style.top = h + 'px');
    }
    document.addEventListener('DOMContentLoaded', update);
    window.addEventListener('resize', update);
    // 顶部区内容变化（如切换筛选导致 stats 数字宽度变化）也同步
    window.addEventListener('load', update);
    if (window.ResizeObserver) {
        document.addEventListener('DOMContentLoaded', () => {
            const top = document.querySelector('.page-top-fixed');
            if (top) new ResizeObserver(update).observe(top);
        });
    }
})();

// 数据已基于国服 BWIKI 官方译名 + Nikke-db 反编译游戏数据全面修正
// 修正项: 译名统一/删除重复/补全缺漏角色/规范阵营&属性
// ===========================================================================

const characters = [

    // ─── 权威表 v2 C 类补录（属性/上线日期/头像 待核对）───

// 排序函数（按 server 决定主排序键：
//   'cn' → 优先 d_cn（国服模式按国服时间降序）
//   其他 → 优先 d_global（默认/国际服/双服按国际服时间降序）
function sortCharacters(server) {
    // 预统计每个日期内的角色数（用于决定"阵营优先 vs 小队优先"）
    // 同日期 ≥3 个角色 → 阵营优先（朝圣者聚顶）
    // 同日期 <3 个角色 → 小队优先（跨阵营同小队凑一起）
    const dateOf = (c) => server === 'cn'
        ? (c.d_cn || c.d_global || "")
        : (c.d_global || c.d_cn || "");
    const dateCount = {};
    characters.forEach(c => {
        const d = dateOf(c);
        dateCount[d] = (dateCount[d] || 0) + 1;
    });

    // 预计算每个角色的"中文小队名"
    const cnSquadOf = (c) => {
        const sq = squadMap[c.en] || '';
        return sq ? (squadCnMap[sq] || sq.split('·').pop()) : '';
    };

    // 预计算"跨阵营小队"集合：同一中文小队涉及 ≥2 个不同阵营的，记下来
    const squadFactions = {};
    characters.forEach(c => {
        const sq = cnSquadOf(c);
        if (!sq) return;
        if (!squadFactions[sq]) squadFactions[sq] = new Set();
        squadFactions[sq].add(c.f);
    });
    const crossFactionSquads = new Set(
        Object.keys(squadFactions).filter(sq => squadFactions[sq].size >= 2)
    );

    characters.sort((a,b) => {
        const dateA = dateOf(a), dateB = dateOf(b);
        if (dateA !== dateB) return dateB.localeCompare(dateA);
        const typeWeight = (c) => {
            if ((c.name_global || "").includes("（珍藏品）")) return 9;
            if (c.r === "SSR") return 1;
            if (c.r === "SR") return 2;
            if (c.r === "R") return 3;
            return 4;
        };
        const wa = typeWeight(a), wb = typeWeight(b);
        if (wa !== wb) return wa - wb;

        const sqCnA = cnSquadOf(a), sqCnB = cnSquadOf(b);
        const fa = factionOrder[a.f] || 99, fb = factionOrder[b.f] || 99;

        // 同日期角色数 ≥3 → 阵营优先模式（朝圣者聚顶）
        // 跨阵营同小队成员单独成段，挪到所有阵营段之后
        if ((dateCount[dateA] || 0) >= 3) {
            const xA = crossFactionSquads.has(sqCnA);
            const xB = crossFactionSquads.has(sqCnB);
            // 跨阵营小队成员排在所有非跨阵营成员之后
            if (xA !== xB) return xA ? 1 : -1;
            // 都是跨阵营小队成员：按中文小队名聚合
            if (xA && xB) {
                if (sqCnA !== sqCnB) return sqCnA.localeCompare(sqCnB, 'zh');
                if (fa !== fb) return fa - fb;
                return (a.en || "").localeCompare(b.en || "");
            }
            // 都不是跨阵营：阵营 → 小队 → 英文名
            if (fa !== fb) return fa - fb;
            if ((sqCnA && !sqCnB) || (!sqCnA && sqCnB)) return sqCnA ? -1 : 1;
            if (sqCnA !== sqCnB) return sqCnA.localeCompare(sqCnB, 'zh');
        } else {
            // 小日期 <3：小队优先 → 阵营 → 英文名
            if ((sqCnA && !sqCnB) || (!sqCnA && sqCnB)) return sqCnA ? -1 : 1;
            if (sqCnA !== sqCnB) return sqCnA.localeCompare(sqCnB, 'zh');
            if (fa !== fb) return fa - fb;
        }
        return (a.en || "").localeCompare(b.en || "");
    });
}

    if (evt && evt.target) evt.target.classList.add('active');
    // 切换 body class 以隐藏对侧日期列
    document.body.classList.remove('server-only-global', 'server-only-cn');
    if (s === 'global') document.body.classList.add('server-only-global');
    else if (s === 'cn') document.body.classList.add('server-only-cn');
    doRender();
}

function doRender() {
    // 按当前服重排（国服模式按 d_cn 降序，其他按 d_global 降序）
    sortCharacters(currentServer);
    const q = document.getElementById('searchBox').value.toLowerCase();
    let data = currentFaction === 'all' ? characters : characters.filter(c => c.f === currentFaction);

    // 服务器过滤
    if (currentServer === 'global') data = data.filter(c => c.d_global);
    else if (currentServer === 'cn') data = data.filter(c => c.d_cn);
    else if (currentServer === 'both') data = data.filter(c => c.d_global && c.d_cn);

    if (q) data = data.filter(c =>
        (c.name_global && c.name_global.toLowerCase().includes(q)) ||
        (c.name_cn && c.name_cn.toLowerCase().includes(q)) ||
        (c.en && c.en.toLowerCase().includes(q)) ||
        (c.n_global && c.n_global.toLowerCase().includes(q)) ||
        (c.n_cn && c.n_cn.toLowerCase().includes(q))
    );

    const tbody = document.getElementById('tbody');
    tbody.innerHTML = '';

    let ssr=0, sr=0, rr=0, globalN=0, cnN=0, bothN=0;

    data.forEach(c => {
        if (c.r==='SSR') ssr++;
        else if (c.r==='SR') sr++;
        else if (c.r==='R') rr++;
        if (c.d_global) globalN++;
        if (c.d_cn) cnN++;
        if (c.d_global && c.d_cn) bothN++;

        const tr = document.createElement('tr');
        tr.className = `faction-${c.f}`;
        const limitedMark = c.lim ? '<span class="limited-mark">★</span>' : '';
        const attrHtml = c.a ? `<span class="attr-dot attr-${c.a}"></span>${attrMap[c.a]||''}` : '-';
        const factionName = factionMap[c.f] || c.f || '-';

        // 角色名：双行（国服名与国际服名不同才展示）+ 英文小字
        const showCnName = c.name_cn && c.name_cn !== c.name_global;
        const nameHtml = `
            <div class="char-name-main">${c.name_global}${limitedMark}</div>
            ${showCnName ? `<div class="char-name-cn">🇨🇳 ${c.name_cn}</div>` : ''}
            <div class="char-en-text">${c.en || ''}</div>
        `;

        // 头像：文件名格式 `中文 (English).png`
        // 1) 英文中的 ": "（半角冒号+空格）整体替换为全角冒号 `：`
        // 2) 直接按数据行 avatar + en 拼文件名（珍藏品已单独存图）
        const avatarHtml = (c.avatar && c.en)
            ? (() => {
                const enClean = c.en.replace(/:\s*/g, '：');
                const avatarClean = c.avatar.replace(/:\s*/g, '：');
                const fname = `${avatarClean} (${enClean}).png`;
                return `<img class="char-avatar" src="avatars/${encodeURIComponent(fname)}" alt="${c.name_global}" onerror="this.outerHTML='<div class=\\'avatar-placeholder\\'>?</div>'">`;
            })()
            : `<div class="avatar-placeholder">?</div>`;

        // 日期
        const dGlobalHtml = c.d_global
            ? `<span class="date-text">${c.d_global}</span>`
            : `<span class="date-na">未上线</span>`;
        const dCnHtml = c.d_cn
            ? `<span class="date-cn-text">${c.d_cn}</span>`
            : `<span class="date-na">未上线</span>`;

        // 备注：优先显示国际服备注，国服备注不同时追加
        let noteHtml = '';
        if (c.n_global) noteHtml += `<div class="note-text">${c.n_global}</div>`;
        if (c.n_cn && c.n_cn !== c.n_global) noteHtml += `<div class="note-text" style="color:#d35400">🇨🇳 ${c.n_cn}</div>`;

        tr.innerHTML = `
            <td class="col-date">${dGlobalHtml}</td>
            <td class="col-date-cn">${dCnHtml}</td>
            <td class="col-name"><div class="name-cell"><span class="faction-bar"></span>${avatarHtml}<div>${nameHtml}</div></div></td>
            <td class="col-rarity"><span class="rarity-tag rarity-${c.r}">${c.r}</span></td>
            <td class="col-faction"><span class="faction-tag">${factionName}</span></td>
            <td class="col-squad"><span class="squad-tag">${squadCnMap[squadMap[c.en]] || (squadMap[c.en] ? squadMap[c.en].split('·').pop() : '-')}</span></td>
            <td class="col-attr">${attrHtml}</td>
            <td class="col-weapon"><span class="weapon-tag">${weaponMap[c.w]||c.w||'-'}</span></td>
            <td class="col-note">${noteHtml}</td>
        `;
        tbody.appendChild(tr);
    });

    document.getElementById('totalCount').textContent = data.length;
    document.getElementById('ssrCount').textContent = ssr;
    document.getElementById('srCount').textContent = sr;
    document.getElementById('rCount').textContent = rr;
    document.getElementById('globalCount').textContent = globalN;
    document.getElementById('cnCount').textContent = cnN;
    document.getElementById('bothCount').textContent = bothN;
}

// 初始化
doRender();
</script>

</body>
</html>
